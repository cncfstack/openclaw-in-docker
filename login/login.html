<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw | AI Agent Login</title>
    <style>
        :root {
            --primary: #00f2ff; /* 霓虹蓝 */
            --bg-dark: #0a0a0c;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0c 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        /* 背景流光动画 */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.15;
            top: 20%;
            left: 20%;
            z-index: -1;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 32px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.6);
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .footer-links {
            margin-top: 24px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
        }
        
        .error-box {
            display: none;
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 8px;
            padding: 10px;
            margin-top: 15px;
            color: #ff6b6b;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">OpenClaw</div>
        <div class="subtitle">您的 24/7 AI 智能雇员控制台</div>
        
        <!-- 表单 -->
        <form id="loginForm">
            <div class="form-group">
                <label for="username">管理账号</label>
                <input type="text" id="username" name="username" placeholder="输入用户名" required>
            </div>
            
            <div class="form-group">
                <label for="password">安全密钥</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            
            <div id="errorBox" class="error-box">
                <span id="errorText"></span>
            </div>
            
            <button id="loginButton" type="submit">立即接入</button>
        </form>

        <div class="footer-links">
            系统版本: <a href="https://github.com/cncfstack/openclaw-in-docker" target="_blank" style="color: white;">v0.1.0-v2026.3.7</a> · 安全网关已开启
        </div>
    </div>

</body>
<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const returnUrl = new URLSearchParams(window.location.search).get('return') || '/';
        const errorBox = document.getElementById('errorBox');
        const loginBtn = document.getElementById('loginButton');
        
        // 清除之前的错误信息
        errorBox.style.display = 'none';
        
        // 显示加载状态
        loginBtn.classList.add('loading');
        loginBtn.disabled = true;
        
        try {
            const formData = new URLSearchParams();
            formData.append('username', username);
            formData.append('password', password);
            
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: formData
            });
            
            const data = await response.json();
            
            if (response.ok && data.success) {
                // 登录成功，跳转
                window.location.href = returnUrl;
            } else {
                // 显示错误
                errorBox.style.display = 'flex';
                document.getElementById('errorText').textContent = data.error || '登录失败';
                
                // 如果是封禁，禁用提交按钮
                if (response.status === 403) {
                    loginBtn.disabled = true;
                    setTimeout(() => {
                        loginBtn.disabled = false;
                    }, 60000); // 1分钟后重试
                }
            }
        } catch (err) {
            errorBox.style.display = 'flex';
            document.getElementById('errorText').textContent = '网络错误，请重试';
        } finally {
            loginBtn.classList.remove('loading');
            if (!loginBtn.disabled) {
                loginBtn.disabled = false;
            }
        }
    });
</script>
</html>
