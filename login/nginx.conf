# /usr/local/openresty/nginx/conf/nginx.conf
worker_processes  1;
error_log  logs/error.log warn;
pid        logs/nginx.pid;

events {
    worker_connections  1024;
    multi_accept on;
    use epoll;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log logs/access.log main buffer=32k flush=5s;

    # 基础优化
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 10m;
    server_tokens off;  # 隐藏版本号

    # 共享内存定义
    lua_shared_dict sessions 20m;           # 会话存储
    lua_shared_dict rate_limit 10m;         # 限流存储
    lua_shared_dict login_attempts 10m;     # 登录尝试记录
    lua_shared_dict banned_ips 5m;           # 封禁IP列表

    # Lua 包路径
    lua_package_path "/usr/local/openresty/site/lualib/?.lua;/usr/local/openresty/site/lualib/?/init.lua;;";
    
    # 初始化（加载用户数据等）
    init_by_lua_block {
        -- 预加载模块
        require "resty.string"
        require "resty.random"
        
        -- 加载用户数据（实际应从数据库读取）
        users = require "users"
    }

    # 定时任务：清理过期的封禁IP
    init_worker_by_lua_block {
        local function clean_banned()
            local banned = ngx.shared.banned_ips
            local keys = banned:get_keys(0)
            local now = ngx.time()
            
            for _, key in ipairs(keys) do
                local expire = banned:get(key .. ":expire")
                if expire and expire < now then
                    banned:delete(key)
                    banned:delete(key .. ":expire")
                end
            end
        end
        
        -- 每5分钟清理一次
        local delay = 300
        local handler
        handler = function()
            clean_banned()
            ngx.timer.at(delay, handler)
        end
        ngx.timer.at(delay, handler)
    }

    server {
        listen 80;
        server_name localhost;

        # ========== 1. 静态资源（完全开放） ==========
        location /static/ {
            alias /usr/local/openresty/nginx/html/static/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # ========== 2. 登录页面 ==========
        location = /login.html {
            root /usr/local/openresty/nginx/html;
        }
        
        # ========== 3. 代理其他所有请求到后端服务 ==========
        location / {
            # 认证检查
            access_by_lua_block {
                local sessions = ngx.shared.sessions
                local cjson = require "cjson"
                local cookie = ngx.var.http_cookie or ""
                local session_id = cookie:match("session_id=([^;]+)")
                
                if not session_id then
                    return ngx.redirect("/login.html?return=" .. ngx.escape_uri(ngx.var.request_uri))
                end
                
                local session_json = sessions:get(session_id)
                if not session_json then
                    return ngx.redirect("/login.html?return=" .. ngx.escape_uri(ngx.var.request_uri))
                end
                
                -- 反序列化会话
                local session = cjson.decode(session_json)
                
                -- 可选：验证 IP 是否变化（严格模式）
                if session.ip ~= ngx.var.remote_addr then
                    sessions:delete(session_id)
                    return ngx.redirect("/login.html?return=" .. ngx.escape_uri(ngx.var.request_uri))
                end
                
                -- 将用户信息存入上下文
                ngx.ctx.user = session
                
                -- 自动续期（还有半小时过期时续期）
                local ttl = sessions:ttl(session_id)
                if ttl and ttl < 1800 then  -- 小于30分钟
                    sessions:set(session_id, session_json, 7200)
                end
            }
            
            proxy_pass http://localhost:18789;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ========== 4. 登录处理（核心安全逻辑） ==========
        location = /api/login {
            # 限流检查
            access_by_lua_file /usr/local/openresty/site/lualib/ratelimit.lua;
            
            # 只接受 POST
            limit_except POST {
                deny all;
            }
            
            content_by_lua_block {
                local password_lib = require "password"
                local cjson = require "cjson"
                
                -- 读取请求体
                ngx.req.read_body()
                local args = ngx.req.get_post_args()
                
                -- 参数验证
                local username = args and args.username
                local password = args and args.password
                
                if not username or not password or #username < 3 or #password < 6 then
                    ngx.status = 400
                    ngx.header.content_type = 'application/json'
                    ngx.say(cjson.encode({error = "用户名或密码格式错误"}))
                    return
                end
                
                -- 检查是否被封禁
                local banned = ngx.shared.banned_ips
                local ip = ngx.var.remote_addr
                if banned:get(ip) then
                    ngx.status = 403
                    ngx.header.content_type = 'application/json'
                    ngx.say(cjson.encode({error = "IP已被封禁，请稍后再试"}))
                    return
                end
                
                -- 调试：打印接收到的用户名和密码
                ngx.log(ngx.ERR, "Login attempt - Username: ", username, ", Password length: ", #password)
                
                -- 验证用户
                local user = users[username]
                if user then
                    ngx.log(ngx.ERR, "User found: ", user.username)
                    ngx.log(ngx.ERR, "Stored hash: ", user.password_hash)
                    ngx.log(ngx.ERR, "Input password: ", password)
                    
                    local verified = password_lib.verify(password, user.password_hash)
                    ngx.log(ngx.ERR, "Password verification result: ", tostring(verified))
                    
                    if verified then
                        -- 生成随机 session
                        local random = require "resty.random"
                        local session_id = ngx.encode_base64(random.bytes(32))
                            :gsub("/", "_"):gsub("+", "-")
                        
                        -- 会话数据
                        local session_data = {
                            username = username,
                            login_time = ngx.time(),
                            ip = ip,
                            user_agent = ngx.var.http_user_agent
                        }
                        
                        -- 存储会话
                        local sessions = ngx.shared.sessions
                        local ok, err = sessions:set(session_id, cjson.encode(session_data), 7200)  -- 2小时
                        
                        if ok then
                            -- 设置安全 Cookie
                            ngx.header['Set-Cookie'] = table.concat({
                                "session_id=" .. session_id,
                                "Path=/",
                                "HttpOnly",
                                "SameSite=Lax",
                                "Max-Age=7200",
                                "Secure",  -- 如果使用 HTTPS
                            }, "; ")
                            
                            -- 清除登录尝试记录
                            local attempts = ngx.shared.login_attempts
                            attempts:delete(ip)
                            
                            ngx.header.content_type = 'application/json'
                            ngx.say(cjson.encode({
                                success = true,
                                username = username
                            }))
                        else
                            ngx.status = 500
                            ngx.say(cjson.encode({error = "服务器错误"}))
                        end
                    else
                        -- 记录失败尝试
                        local attempts = ngx.shared.login_attempts
                        local key = ip
                        local count = attempts:get(key) or 0
                        count = count + 1
                        attempts:set(key, count, 3600)  -- 1小时内有效
                        
                        -- 失败5次后封禁1小时
                        if count >= 5 then
                            local banned = ngx.shared.banned_ips
                            banned:set(ip, true)
                            banned:set(ip .. ":expire", ngx.time() + 3600)
                            ngx.status = 403
                            ngx.say(cjson.encode({error = "尝试次数过多，IP已被封禁1小时"}))
                            return
                        end
                        
                        ngx.status = 401
                        ngx.say(cjson.encode({error = "用户名或密码错误"}))
                    end
                else
                    ngx.log(ngx.ERR, "User not found: ", username)
                    -- 用户不存在也记录失败尝试，防止用户名枚举
                    local attempts = ngx.shared.login_attempts
                    local key = ip
                    local count = attempts:get(key) or 0
                    count = count + 1
                    attempts:set(key, count, 3600)  -- 1小时内有效
                    
                    -- 失败5次后封禁1小时
                    if count >= 5 then
                        local banned = ngx.shared.banned_ips
                        banned:set(ip, true)
                        banned:set(ip .. ":expire", ngx.time() + 3600)
                        ngx.status = 403
                        ngx.say(cjson.encode({error = "尝试次数过多，IP已被封禁1小时"}))
                        return
                    end
                    
                    ngx.status = 401
                    ngx.say(cjson.encode({error = "用户名或密码错误"}))
                end
            }
        }

        # ========== 5. 登出 ==========
        location = /api/logout {
            content_by_lua_block {
                local sessions = ngx.shared.sessions
                local cookie = ngx.var.http_cookie or ""
                local session_id = cookie:match("session_id=([^;]+)")
                
                if session_id then
                    sessions:delete(session_id)
                end
                
                -- 清除 Cookie
                ngx.header['Set-Cookie'] = "session_id=; Path=/; HttpOnly; Max-Age=0"
                ngx.redirect("/login.html")
            }
        }

        # ========== 6. 获取当前用户信息 ==========
        location = /api/user {
            content_by_lua_block {
                local sessions = ngx.shared.sessions
                local cjson = require "cjson"
                local cookie = ngx.var.http_cookie or ""
                local session_id = cookie:match("session_id=([^;]+)")
                
                if not session_id then
                    ngx.status = 401
                    ngx.say(cjson.encode({error = "未登录"}))
                    return
                end
                
                local session_json = sessions:get(session_id)
                if not session_json then
                    ngx.status = 401
                    ngx.say(cjson.encode({error = "会话已过期"}))
                    return
                end
                
                local session = cjson.decode(session_json)
                ngx.say(cjson.encode({
                    username = session.username,
                    login_time = session.login_time
                }))
            }
        }

        # ========== 7. 错误处理 ==========
        location @error_401 {
            default_type application/json;
            return 401 '{"error":"unauthorized"}';
        }

        # ========== 8. 健康检查 ==========
        location /health {
            access_log off;
            return 200 "healthy\n";
        }
    }
}