<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw · 登录</title>
    <!-- Font Awesome 6 (免费图标库) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #1a1e2b, #0b0d15);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* 主卡片 — 毛玻璃效果 */
        .login-card {
            width: 100%;
            max-width: 440px;
            background: rgba(18, 22, 33, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 107, 53, 0.15);
            border-radius: 2rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 107, 53, 0.1) inset;
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-4px);
        }

        /* 品牌区 */
        .brand {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .logo-icon {
            font-size: 2.8rem;
            color: #ff6b35;
            filter: drop-shadow(0 4px 8px rgba(255, 107, 53, 0.3));
        }

        .logo-text {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff 0%, #ffb09c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .slogan {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #ff8a5c;
            opacity: 0.8;
            font-weight: 400;
            word-spacing: 2px;
        }

        /* 表单标题 */
        .form-header {
            margin-bottom: 2rem;
        }

        .form-header h2 {
            color: #fff;
            font-weight: 500;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-header h2 i {
            color: #ff6b35;
            font-size: 1.2rem;
        }

        .form-header p {
            color: #a0a8c0;
            font-size: 0.9rem;
            margin-top: 0.3rem;
        }

        /* 输入框组 */
        .input-group {
            margin-bottom: 1.25rem;
        }

        .input-label {
            display: block;
            color: #d1d5ed;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
            letter-spacing: 0.3px;
        }

        .input-field {
            width: 100%;
            background: rgba(10, 14, 23, 0.6);
            border: 1px solid #2a2f42;
            border-radius: 1.2rem;
            padding: 0.9rem 1.2rem;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            border-color: #ff6b35;
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.2);
            background: rgba(10, 14, 23, 0.8);
        }

        .input-field::placeholder {
            color: #4f5570;
            font-weight: 300;
        }

        /* 密码行（含忘记链接） */
        .password-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.4rem;
        }

        .forgot-link {
            color: #ff8a5c;
            font-size: 0.8rem;
            text-decoration: none;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .forgot-link:hover {
            opacity: 1;
            text-decoration: underline;
        }

        /* 登录按钮 */
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #ff6b35 0%, #ff4f1e 100%);
            border: none;
            border-radius: 1.5rem;
            padding: 0.9rem;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px -5px rgba(255, 107, 53, 0.4);
            margin: 1.8rem 0 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .login-btn:hover {
            background: linear-gradient(135deg, #ff7a4a 0%, #ff6329 100%);
            transform: scale(1.02);
            box-shadow: 0 10px 25px -3px #ff6b35;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .login-btn i {
            font-size: 1rem;
        }

        /* 加载状态 (通过 js 触发) */
        .login-btn.loading {
            opacity: 0.8;
            pointer-events: none;
        }
        .login-btn.loading i {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 错误提示 */
        .error-message {
            background: rgba(255, 70, 70, 0.15);
            border-left: 4px solid #ff4646;
            border-radius: 0.8rem;
            padding: 0.8rem 1rem;
            color: #ffb0b0;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            margin-bottom: 1rem;
            backdrop-filter: blur(4px);
        }

        .error-message i {
            color: #ff7070;
            font-size: 1rem;
        }

        /* 注册引导 */
        .signup-prompt {
            text-align: center;
            color: #9aa1b9;
            font-size: 0.9rem;
            border-top: 1px solid rgba(255, 107, 53, 0.2);
            padding-top: 1.5rem;
            margin-top: 0.8rem;
        }

        .signup-prompt a {
            color: #ff8a5c;
            text-decoration: none;
            font-weight: 600;
            margin-left: 0.3rem;
            transition: color 0.2s;
        }

        .signup-prompt a:hover {
            color: #ff6b35;
            text-decoration: underline;
        }

        /* 返回链接（例如回到首页） */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: #a0a8c0;
            text-decoration: none;
            font-size: 0.9rem;
            margin-top: 0.8rem;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: #ff8a5c;
        }

        /* 移动端适配 */
        @media (max-width: 480px) {
            .login-card {
                padding: 2rem 1.2rem;
                border-radius: 1.5rem;
            }
            .logo-text {
                font-size: 1.8rem;
            }
            .logo-icon {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <!-- 品牌标志 -->
        <div class="brand">
            <div class="logo-wrapper">
                <i class="fas fa-lobster logo-icon"></i> <!-- 小龙虾图标 -->
                <span class="logo-text">OpenClaw</span>
            </div>
            <div class="slogan">EXFOLIATE! EXFOLIATE!</div>
        </div>

        <!-- 表单头部 (动态显示 return 参数) -->
        <div class="form-header">
            <h2>
                <i class="fas fa-lock"></i>
                授权访问
            </h2>
            <p>请输入凭证以继续使用 OpenClaw 面板</p>
        </div>

        <!-- 错误提示容器 (默认隐藏) -->
        <div id="errorBox" class="error-message" style="display: none;">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="errorText">用户名或密码错误</span>
        </div>

        <!-- 登录表单 -->
        <form id="loginForm" method="POST" action="/do-login">
            <!-- 隐藏字段：记录登录后跳转回哪个页面 (由后端生成) -->
            <input type="hidden" name="return" id="returnInput" value="/">

            <div class="input-group">
                <label class="input-label" for="username">
                    <i class="far fa-user" style="margin-right: 6px; color: #ff8a5c;"></i> 用户名
                </label>
                <input type="text" id="username" name="username" class="input-field" 
                       placeholder="例如 admin / openclaw" autocomplete="username" required autofocus>
            </div>

            <div class="input-group">
                <div class="password-row">
                    <label class="input-label" for="password">
                        <i class="fas fa-key" style="margin-right: 6px; color: #ff8a5c;"></i> 密码
                    </label>
                    <a href="#" class="forgot-link" onclick="alert('请联系管理员重置密码'); return false;">忘记密码?</a>
                </div>
                <input type="password" id="password" name="password" class="input-field" 
                       placeholder="••••••••" autocomplete="current-password" required>
            </div>

            <button type="submit" id="loginButton" class="login-btn">
                <i class="fas fa-arrow-right-to-bracket"></i>
                登录 · 进入控制台
            </button>
        </form>

        <!-- 提示：无账号？(根据实际场景可选) -->
        <div class="signup-prompt">
            没有访问权限？
            <a href="#" onclick="alert('请咨询 OpenClaw 管理员开通账号'); return false;">申请接入</a>
        </div>

        <!-- 辅助链接：返回首页 / 关于 (可选) -->
        <div style="display: flex; justify-content: center; margin-top: 0.5rem;">
            <a href="https://openclaw.ai" target="_blank" class="back-link">
                <i class="fas fa-external-link-alt"></i> openclaw.ai
            </a>
        </div>
    </div>

    <script>
        (function() {
            // 获取DOM元素
            const form = document.getElementById('loginForm');
            const username = document.getElementById('username');
            const password = document.getElementById('password');
            const loginBtn = document.getElementById('loginButton');
            const errorBox = document.getElementById('errorBox');
            const errorText = document.getElementById('errorText');
            const returnInput = document.getElementById('returnInput');

            // 从 URL 参数中获取 return 路径 (例如 ?return=/settings)
            const urlParams = new URLSearchParams(window.location.search);
            const returnPath = urlParams.get('return') || '/';
            returnInput.value = returnPath;

            // 如果 URL 包含错误标记（例如后端重定向回来时带 ?error=1），显示提示
            if (urlParams.has('error')) {
                const msg = urlParams.get('error') === '1' ? '用户名或密码错误' : decodeURIComponent(urlParams.get('error') || '登录失败，请重试');
                showError(msg);
            }

            // 显示错误信息的函数
            function showError(msg) {
                errorText.innerText = msg;
                errorBox.style.display = 'flex';
                // 5秒后自动隐藏
                setTimeout(() => {
                    errorBox.style.display = 'none';
                }, 5000);
            }

            // 表单提交时增加加载动画，防止重复提交
            form.addEventListener('submit', function(e) {
                const userVal = username.value.trim();
                const passVal = password.value.trim();

                if (!userVal || !passVal) {
                    e.preventDefault();
                    showError('请完整填写用户名和密码');
                    return;
                }

                // 添加加载状态
                loginBtn.classList.add('loading');
                loginBtn.innerHTML = '<i class="fas fa-spinner"></i> 登录中...';

                // 允许表单继续提交（不阻止默认 action）
                // 如果想用 fetch AJAX 提交也可以，但这里保持传统表单提交，适配方案二/三
            });

            // 可选：演示自动填充管理员的测试账号 (仅开发调试用，生产可删除)
            // 双击用户名输入框填充演示账号 (方便测试)
            username.addEventListener('dblclick', function() {
                username.value = 'openclaw';
                password.value = 'demo123';
            });
        })();
    </script>
</body>
</html>
