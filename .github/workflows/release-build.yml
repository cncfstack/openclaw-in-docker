name: Release Build

on:
  push:
    tags:
      - 'v0.1.0'
      - 'v0.2.0'
jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: |
        docker login  --username=${{ secrets.HARBOR_PUSH_USERNAME }} --password=${{ secrets.HARBOR_PUSH_PASSWORD }} harbor.cncfstack.com
        docker buildx create --name mybuilder --use
        docker buildx build --platform linux/amd64,linux/arm64 --push . --file Dockerfile --tag harbor.cncfstack.com/cncfstack/openclaw-in-docker:v0.1.0_v2026.3.2
