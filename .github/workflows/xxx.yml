# 工作流的名称，会在 GitHub Actions 的界面上显示
name: 镜像构建

# 定义了触发此工作流运行的事件
on:
  # 1. workflow_dispatch: 允许用户通过 GitHub 的“Actions”选项卡手动触发工作流
  workflow_dispatch:
  # 2. push: 当代码被推送到特定分支时触发
  push:
    branches:
      - main      # 当推送到 main 分支时触发

  schedule:
    # 目的：定期获取 OpenClaw 项目的最新更新并构建镜像
    - cron: '0 */6 * * *'

# 定义工作流级别的环境变量，在后续的 job 和 step 中都可以使用
env:
  REGISTRY: harbor.cncfstack.com
  IMAGE_NAME: cncfstack/openclaw-in-docker

# 定义要执行的任务（jobs），这里只有一个名为 'build' 的任务
jobs:
  build:
    # 指定任务运行在最新版的 Ubuntu 虚拟机环境上
    runs-on: ubuntu-latest

    # 为当前 job 授予的权限
    permissions:
      contents: write

    # 定义 job 的执行步骤，按顺序运行
    steps:
      # 步骤 1: 检出当前仓库的代码
      - name: Checkout repository
        uses: actions/checkout@v4  # 使用 actions/checkout 这个官方 action 的 v4 版本

      # 步骤 2: 设置 Docker Buildx
      # Buildx 是 Docker CLI 的一个插件，支持多平台构建、高级缓存等特性
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 步骤 3: 登录到容器镜像仓库
      - name: Log in to Container Registry
        uses: docker/login-action@v3  # 使用 Docker 官方的登录 action
        with:
          registry: ${{ env.REGISTRY }}           # 从环境变量获取仓库地址
          username: ${{ secrets.HARBOR_PUSH_USERNAME }} # 从 GitHub Secrets 获取用户名
          password: ${{ secrets.HARBOR_PUSH_PASSWORD }} # 从 GitHub Secrets 获取密码

      - name: Check for new OpenClaw release
        id: check_release
        run: |
          # Get the latest release from OpenClaw repository
          LATEST_TAG=$(curl -s https://api.github.com/repos/openclaw/openclaw/releases/latest | jq -r '.tag_name // empty')
          LATEST_COMMIT=$(curl -s https://api.github.com/repos/openclaw/openclaw/commits/main | jq -r '.sha')

          echo "Latest OpenClaw version: ${LATEST_TAG} , latest commit ${LATEST_COMMIT}"
          echo "latest_tag=${LATEST_TAG}" >> $GITHUB_OUTPUT
          echo "latest_commit=${LATEST_COMMIT}" >> $GITHUB_OUTPUT
          
          # Check if we've already built this version
          if [ -f ".last-openclaw-tag" ]; then
            LAST_TAG=$(cat .last-openclaw-tag)
            echo "Last built tag: ${LAST_TAG}"
            
            if [ "$LATEST_TAG" = "$LAST_TAG" ]; then
              echo "new_tag=false" >> $GITHUB_OUTPUT
              echo "No new release found"
            else
              echo "new_tag=true" >> $GITHUB_OUTPUT
              echo "New release detected!"
            fi
          else
            echo "new_tag=true" >> $GITHUB_OUTPUT
            echo "First run - will build"
          fi

          if [ -f ".last-openclaw-commit" ]; then
            LAST_COMMIT=$(cat .last-openclaw-commit)
            echo "Last built commit: ${LAST_COMMIT}"
            
            if [ "$LATEST_COMMIT" = "$LAST_COMMIT" ]; then
              echo "new_commit=false" >> $GITHUB_OUTPUT
              echo "No new release found"
            else
              echo "new_commit=true" >> $GITHUB_OUTPUT
              echo "New release detected!"
            fi
          else
            echo "new_commit=true" >> $GITHUB_OUTPUT
            echo "First run - will build"
          fi

      - name: Update version tracker
        if: steps.check_release.outputs.new_tag == 'true' || steps.check_release.outputs.new_commit == 'true'
        run: |
          echo "${{ steps.check_release.outputs.latest_tag }}" > .last-openclaw-tag
          echo "${{ steps.check_release.outputs.latest_commit }}" > .last-openclaw-commit
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-openclaw-tag .last-openclaw-commit
          git diff --quiet && git diff --staged --quiet || git commit -m "Update OpenClaw version  to ${{ steps.check_release.outputs.latest_tag }} OR ${{ steps.check_release.outputs.latest_commit }}"
          git push

      # 步骤 4: 提取 Docker 镜像的元数据（标签、标签等）
      - name: Extract metadata
        id: meta  # 给这个步骤定义一个 ID，后续步骤可以通过 steps.meta.outputs 引用它的输出
        uses: docker/metadata-action@v5
        with:
          # 要生成元数据的完整镜像名称（仓库地址/镜像名）
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # 定义生成哪些标签 (tags)
          tags: |
            # 1. 如果是在默认分支（main）上触发，则生成一个 latest 标签
            type=raw,value=latest,enable={{is_default_branch}}
            # 4. 如果是定时任务触发，则生成一个基于日期的标签，例如 20231027
            #type=schedule,value=latest
            # 5. 基于标签生成标签，例如 v1.0.0-prod
            type=ref,event=tag,suffix=-${{ steps.check_release.outputs.latest_tag }}


      - name: Update version tracker
        if: steps.check_release.outputs.new_tag == 'true' || steps.check_release.outputs.new_commit == 'true'
        run: |
          echo "${{ steps.check_release.outputs.latest_tag }}" > .last-openclaw-tag
          echo "${{ steps.check_release.outputs.new_commit }}" > .last-openclaw-commit
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-openclaw-tag .last-openclaw-commit
          git diff --quiet && git diff --staged --quiet || git commit -m "Update OpenClaw version  to ${{ steps.check_release.outputs.latest_tag }} OR ${{ steps.check_release.outputs.latest_commit }}"
          git push origin HEAD:${{ github.ref }}


      # 步骤 6: 构建并推送 Docker 镜像（核心步骤）
      - name: Build and push Docker image (Tag)
        if: steps.check_release.outputs.new_tag == 'true'
        uses: docker/build-push-action@v5  # 使用 Docker 官方的 build-push action
        with:
          context: .                       # 构建上下文为当前目录
          file: ./Dockerfile              # 指定 Dockerfile 的路径
          # 决定是否推送镜像到仓库
          # 逻辑: 如果不是手动触发 (workflow_dispatch)，则总是推送。
          #       如果是手动触发，则根据用户输入的 push_image 布尔值来决定是否推送。
          push: ${{ (github.event_name != 'workflow_dispatch') || inputs.push_image }}
          # 要打的标签，从步骤 4 (id=meta) 的输出中获取
          tags: dev-${{ steps.check_release.outputs.latest_tag }}
          # 要打的标签（labels），从步骤 4 (id=meta) 的输出中获取
          labels: ${{ steps.meta.outputs.labels }}
          # 构建参数，传递给 Dockerfile 的 ARG 指令
          build-args: |
            # 将步骤 5 确定的 OpenClaw 版本传递给 Dockerfile 中的 OPENCLAW_VERSION 构建参数
            OPENCLAW_VERSION=${{ steps.check_release.outputs.latest_tag }}
          # 设置缓存源，使用 GitHub Actions 内置的缓存 (gha)
          cache-from: type=gha
          # 设置缓存目标，mode=max 表示尽可能多地缓存构建层
          cache-to: type=gha,mode=max
          # 构建的目标平台：Linux on amd64 (x86_64) 和 Linux on arm64
          # 这是 Buildx 的特性，可以构建多架构的镜像清单
          platforms: linux/amd64,linux/arm64


      # 步骤 6: 构建并推送 Docker 镜像（核心步骤）
      - name: Build and push Docker image (Latest)
        if:  steps.check_release.outputs.new_commit == 'true'
        uses: docker/build-push-action@v5  # 使用 Docker 官方的 build-push action
        with:
          context: .                       # 构建上下文为当前目录
          file: ./Dockerfile              # 指定 Dockerfile 的路径
          # 决定是否推送镜像到仓库
          # 逻辑: 如果不是手动触发 (workflow_dispatch)，则总是推送。
          #       如果是手动触发，则根据用户输入的 push_image 布尔值来决定是否推送。
          push: ${{ (github.event_name != 'workflow_dispatch') || inputs.push_image }}
          # 要打的标签，从步骤 4 (id=meta) 的输出中获取
          tags: latest
          # 要打的标签（labels），从步骤 4 (id=meta) 的输出中获取
          labels: ${{ steps.meta.outputs.labels }}
          # 构建参数，传递给 Dockerfile 的 ARG 指令
          build-args: |
            # 将步骤 5 确定的 OpenClaw 版本传递给 Dockerfile 中的 OPENCLAW_VERSION 构建参数
            OPENCLAW_VERSION=main
          # 设置缓存源，使用 GitHub Actions 内置的缓存 (gha)
          cache-from: type=gha
          # 设置缓存目标，mode=max 表示尽可能多地缓存构建层
          cache-to: type=gha,mode=max
          # 构建的目标平台：Linux on amd64 (x86_64) 和 Linux on arm64
          # 这是 Buildx 的特性，可以构建多架构的镜像清单
          platforms: linux/amd64,linux/arm64


      # 步骤 7: 生成构建摘要，在 GitHub Actions 运行报告的“Steps”部分显示一个美观的总结
      - name: Generate build summary
        # 这是一个 Shell 脚本，内容是将 Markdown 格式的文本写入到 GITHUB_STEP_SUMMARY 文件中
        run: |
          # 添加一个标题 (H3 级别)
          echo "### 🦞 OpenClaw Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # 显示构建的 OpenClaw 版本
          echo "**OpenClaw Version:** \`${{ steps.check_release.outputs.latest_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # 显示生成的镜像标签
          echo "**Image Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # 显示目标仓库
          echo "**Registry:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # 根据触发条件，在总结中说明镜像是否被推送
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.push_image }}" = "true" ]; then
              echo "✅ Image pushed to registry" >> $GITHUB_STEP_SUMMARY
            else
              echo "ℹ️ Image built but not pushed (manual trigger with push disabled)" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "✅ Image pushed to registry" >> $GITHUB_STEP_SUMMARY
          fi