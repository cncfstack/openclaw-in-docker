name: 最新Tag构建

on:
  schedule:
    # 定时每天构建一次，支持手动触发
    - cron: '43 21 * * *'
  workflow_dispatch:

jobs:
  check-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for new OpenClaw release
        id: check_release
        run: |
          # 获取最新的Tag名称
          LATEST_RELEASE_TAG=$(curl -s https://api.github.com/repos/openclaw/openclaw/releases/latest | jq -r '.tag_name // empty')
          
          echo "Latest OpenClaw version: ${LATEST_RELEASE_TAG}"
          echo "latest_version_tag=${LATEST_RELEASE_TAG}" >> $GITHUB_OUTPUT
          
          # Check if we've already built this version
          if [ -f ".last-openclaw-tag" ]; then
            LAST_TAG=$(cat .last-openclaw-tag)
            echo "Last built version: ${LAST_TAG}"
            
            if [ "$LATEST_RELEASE_TAG" = "$LAST_TAG" ]; then
              echo "new_release=false" >> $GITHUB_OUTPUT
              echo "No new release found"
            else
              echo "new_release=true" >> $GITHUB_OUTPUT
              echo "New release detected!"
            fi
          else
            echo "new_release=true" >> $GITHUB_OUTPUT
            echo "First run - will build"
          fi

      - name: Update version tracker
        if: steps.check_release.outputs.new_release == 'true'
        run: |
          echo "${{ steps.check_release.outputs.latest_version_tag }}" > .last-openclaw-tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-openclaw-tag
          git diff --quiet && git diff --staged --quiet || git commit -m "Update OpenClaw version tracker to ${{ steps.check_release.outputs.latest_version_tag }}"
          git push

      - name: Trigger build workflow
        if: steps.check_release.outputs.new_release == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-image.yml',
              ref: 'main',
              inputs: {
                openclaw_version: '${{ steps.check_release.outputs.latest_version_tag }}',
                push_image: 'true'
              }
            });
            
            console.log('✅ Triggered build workflow for new OpenClaw release: ${{ steps.check_release.outputs.latest_version_tag }}');

      - name: Create summary
        if: always()
        run: |
          echo "### 🦞 OpenClaw Release Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Latest OpenClaw Version:** \`${{ steps.check_release.outputs.latest_version_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_release.outputs.new_release }}" = "true" ]; then
            echo "✅ **New release detected!** Build workflow triggered." >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No new release. Docker image is up to date." >> $GITHUB_STEP_SUMMARY
          fi
