name: OpenClaw Release Tracker

on:
  schedule:
    # Check for new OpenClaw releases every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for new OpenClaw release
        id: check_release
        run: |
          # Get the latest release from OpenClaw repository
          LATEST_TAG=$(curl -s https://api.github.com/repos/openclaw/openclaw/releases/latest | jq -r '.tag_name // empty')
          LATEST_COMMIT=$(curl -s https://api.github.com/repos/openclaw/openclaw/commits/main | jq -r '.sha')

          echo "Latest OpenClaw version: ${LATEST_TAG} , latest commit ${LATEST_COMMIT}"
          echo "latest_tag=${LATEST_TAG}" >> $GITHUB_OUTPUT
          echo "latest_commit=${LATEST_COMMIT}" >> $GITHUB_OUTPUT
          
          # Check if we've already built this version
          if [ -f ".last-openclaw-tag" ]; then
            LAST_TAG=$(cat .last-openclaw-tag)
            echo "Last built tag: ${LAST_TAG}"
            
            if [ "$LATEST_TAG" = "$LAST_TAG" ]; then
              echo "new_tag=false" >> $GITHUB_OUTPUT
              echo "No new release found"
            else
              echo "new_tag=true" >> $GITHUB_OUTPUT
              echo "New release detected!"
            fi
          else
            echo "new_tag=true" >> $GITHUB_OUTPUT
            echo "First run - will build"
          fi

          if [ -f ".last-openclaw-commit" ]; then
            LAST_COMMIT=$(cat .last-openclaw-commit)
            echo "Last built commit: ${LAST_COMMIT}"
            
            if [ "$LATEST_COMMIT" = "$LAST_COMMIT" ]; then
              echo "new_commit=false" >> $GITHUB_OUTPUT
              echo "No new release found"
            else
              echo "new_commit=true" >> $GITHUB_OUTPUT
              echo "New release detected!"
            fi
          else
            echo "new_commit=true" >> $GITHUB_OUTPUT
            echo "First run - will build"
          fi

      - name: Update version tracker
        if: steps.check_release.outputs.new_tag == 'true' || steps.check_release.outputs.new_commit == 'true'
        run: |
          echo "${{ steps.check_release.outputs.latest_tag }}" > .last-openclaw-tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-openclaw-tag .last-openclaw-commit
          git diff --quiet && git diff --staged --quiet || git commit -m "Update OpenClaw version tracker to ${{ steps.check_release.outputs.latest_tag }} OR ${{ steps.check_release.outputs.latest_commit }}"
          git push


      - name: Trigger build workflow
        if: steps.check_release.outputs.new_tag == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-image.yml',
              ref: 'main',
              inputs: {
                openclaw_version: '${{ steps.check_release.outputs.latest_tag }}',
                push_image: 'true'
              }
            });
            
            console.log('✅ Triggered build workflow for new OpenClaw release: ${{ steps.check_release.outputs.latest_tag }}');

      - name: Create summary
        if: always()
        run: |
          echo "### 🦞 OpenClaw Release Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Latest OpenClaw Version:** \`${{ steps.check_release.outputs.latest_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_release.outputs.new_tag }}" = "true" ]; then
            echo "✅ **New release detected!** Build workflow triggered." >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No new release. Docker image is up to date." >> $GITHUB_STEP_SUMMARY
          fi
