name: 新版本发布构建
on:
    push:
        tags:
            - 'v*'
jobs:
  build:
    runs-on: ubuntu-latest
    # 为当前 job 授予的权限
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Build the Docker image
        id: build_image
        run: |
          OPENCLAW_LATEST_TAG=$(curl -s https://api.github.com/repos/openclaw/openclaw/releases/latest | jq -r '.tag_name // empty' | tr -d 'v')
          echo "Latest OpenClaw version: ${OPENCLAW_LATEST_TAG}"
          echo "opencalw_latest_tag=${OPENCLAW_LATEST_TAG}" >> $GITHUB_OUTPUT

          # Create swapfile
          if [ -f /swapfile ]; then
              sudo swapoff /swapfile 2>/dev/null || true
          fi
          sudo dd if=/dev/zero of=/swapfile bs=1M count=4096
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -g
  
          docker login  --username=${{ secrets.HARBOR_PUSH_USERNAME }} --password=${{ secrets.HARBOR_PUSH_PASSWORD }} harbor.cncfstack.com
          docker buildx create --name mybuilder --use

          sed -i "s/VERSION_TAG/v${OPENCLAW_LATEST_TAG}-${{ github.ref_name }}/g" login/login.html
          
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag harbor.cncfstack.com/cncfstack/openclaw-in-docker:v${OPENCLAW_LATEST_TAG}-${{ github.ref_name }} \
            --tag harbor.cncfstack.com/cncfstack/openclaw-in-docker:latest \
            --build-arg OPENCLAW_VERSION=${OPENCLAW_LATEST_TAG} \
            --push . --file Dockerfile
      - name: Update version tracker
        run: |
          sed -i "s|registry.cncfstack.com/cncfstack/openclaw-in-docker:.*|registry.cncfstack.com/cncfstack/openclaw-in-docker:v${{ steps.build_image.outputs.openclaw_latest_tag }}-${{ github.ref_name }}|g" README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "[bot] Update InDocker version to ${{ github.ref_name }}"
          git push
      - name: Generate build summary
        # 这是一个 Shell 脚本，内容是将 Markdown 格式的文本写入到 GITHUB_STEP_SUMMARY 文件中
        run: |
          echo "### 🦞 OpenClaw In Docker 新版本构建" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**OpenClaw Version:** \`${{ steps.build_image.outputs.openclaw_latest_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**当前项目版本:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**下载地址:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "docker pull registry.cncfstack.com/cncfstack/openclaw-in-docker:v${OPENCLAW_LATEST_TAG}-${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "docker pull registry.cncfstack.com/cncfstack/openclaw-in-docker:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "镜像列表 [cncfstack/openclaw-in-docker](https://cncfstack.com/i/cncfstack/openclaw-in-docker)" >> $GITHUB_STEP_SUMMARY
          echo "✅ OpenClaw In Docker 有新 Push 时自动触发" >> $GITHUB_STEP_SUMMARY