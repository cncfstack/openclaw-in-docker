name: OpenClaw新版本发布自动构建
on:
  schedule:
    - cron: '0 */3 * * *'

# 定义工作流级别的环境变量，在后续的 job 和 step 中都可以使用
env:
  REGISTRY: harbor.cncfstack.com        # 镜像仓库地址
  IMAGE_NAME: cncfstack/openclaw-in-docker # 镜像名称（不包括仓库地址）

# 定义要执行的任务（jobs），这里只有一个名为 'build' 的任务
jobs:
  build:
    # 指定任务运行在最新版的 Ubuntu 虚拟机环境上
    runs-on: ubuntu-latest

    # 为当前 job 授予的权限
    permissions:
      contents: write

    # 定义 job 的执行步骤，按顺序运行
    steps:
      # 步骤 1: 检出当前仓库的代码
      - name: Checkout repository
        uses: actions/checkout@v4  # 使用 actions/checkout 这个官方 action 的 v4 版本

      - name: Check for new OpenClaw release
        id: check_release
        run: |

          OPENCLAW_LATEST_TAG=$(curl -s https://api.github.com/repos/openclaw/openclaw/releases/latest | jq -r '.tag_name // empty' | tr -d 'v')
          echo "Latest OpenClaw version: ${OPENCLAW_LATEST_TAG}"
          echo "openclaw_latest_tag=${OPENCLAW_LATEST_TAG}" >> $GITHUB_OUTPUT

          INDOCKER_LATEST_TAG=$(curl -s https://api.github.com/repos/cncfstack/openclaw-in-docker/releases/latest | jq -r '.tag_name // empty')
          echo "Indocker latest tag: ${INDOCKER_LATEST_TAG}"
          echo "indocker_latest_tag=${INDOCKER_LATEST_TAG}" >> $GITHUB_OUTPUT

          # Check if we've already built this version
          if [ -f ".last-openclaw-tag" ]; then
            OPENCLAW_LAST_TAG=$(cat .last-openclaw-tag)
            echo "Last built tag: ${OPENCLAW_LAST_TAG}"
            
            if [ "$OPENCLAW_LATEST_TAG" = "$OPENCLAW_LAST_TAG" ]; then
              echo "new_tag=false" >> $GITHUB_OUTPUT
              echo "No new release found"
            else
              echo "new_tag=true" >> $GITHUB_OUTPUT
              echo "New release detected!"
            fi
          else
            echo "new_tag=true" >> $GITHUB_OUTPUT
            echo "First run - will build"
          fi

      - name: Update version tracker
        if: steps.check_release.outputs.new_tag == 'true'
        run: |
          echo "${{ steps.check_release.outputs.openclaw_latest_tag }}" > .last-openclaw-tag
          sed -i "s|registry.cncfstack.com/cncfstack/openclaw-in-docker:.*|registry.cncfstack.com/cncfstack/openclaw-in-docker:v${{ steps.check_release.outputs.openclaw_latest_tag }}-${{ steps.check_release.outputs.indocker_latest_tag }}|g" README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-openclaw-tag README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "[bot] Update OpenClaw version  to ${{ steps.check_release.outputs.latest_tag }} "
          git push

      - name: Build the Docker image
        if: steps.check_release.outputs.new_tag == 'true'
        id: build_image
        run: |

          # Create swapfile
          if [ -f /swapfile ]; then
              sudo swapoff /swapfile 2>/dev/null || true
          fi
          sudo dd if=/dev/zero of=/swapfile bs=1M count=4096
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -g
  
          docker login  --username=${{ secrets.HARBOR_PUSH_USERNAME }} --password=${{ secrets.HARBOR_PUSH_PASSWORD }} harbor.cncfstack.com
          docker buildx create --name mybuilder --use

          sed -i "s/VERSION_TAG/v${{ steps.check_release.outputs.openclaw_latest_tag }}-${{ steps.check_release.outputs.indocker_latest_tag }}/g" login/login.html
          
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag harbor.cncfstack.com/cncfstack/openclaw-in-docker:v${{ steps.check_release.outputs.openclaw_latest_tag }}-${{ steps.check_release.outputs.indocker_latest_tag }} \
            --tag harbor.cncfstack.com/cncfstack/openclaw-in-docker:latest \
            --build-arg OPENCLAW_VERSION=${{ steps.check_release.outputs.openclaw_latest_tag }} \
            --push . --file Dockerfile 

      - name: Generate build summary
        if: steps.check_release.outputs.new_tag == 'true'
        run: |
          echo "### 🦞 OpenClaw 新版本构建" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**OpenClaw Version:** \`${{ steps.check_release.outputs.openclaw_latest_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**当前项目版本:** \`${{ steps.check_release.outputs.indocker_latest_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**下载地址:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "docker pull registry.cncfstack.com/cncfstack/openclaw-in-docker:v${{ steps.check_release.outputs.openclaw_latest_tag }}-${{ steps.check_release.outputs.indocker_latest_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "docker pull registry.cncfstack.com/cncfstack/openclaw-in-docker:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "镜像列表 [cncfstack/openclaw-in-docker](https://cncfstack.com/i/cncfstack/openclaw-in-docker)" >> $GITHUB_STEP_SUMMARY
          echo "✅ OpenClaw In Docker 有新 Push 时自动触发" >> $GITHUB_STEP_SUMMARY